# update: 2026-06-13
# 简介: https://github.com/echs-top/proxy


# 节点IP优先级：ip-version: ipv6-prefer
providers: &providers { type: http, interval: 86400, proxy: 直接连接, header: { User-Agent: ["clash-verge/v2.5.1"] }, health-check: { enable: true, url: 'https://dns.google/generate_204', expected-status: 204,  interval: 900, timeout: 3000, max-failed-times: 2, lazy: true }, override: { ip-version: dual }, exclude-filter: '(?i)套餐|剩余|流量|到期|重置|频道|订阅|官网|禁止|客户端|有效|联系|测试|节点|日期|群组|加入|通知|维护|网址|地址|下载|更新|APP|登录|严禁|恢复|处理|谢谢' }
# age-secret-key: '私钥', override: { ip-version: dual, additional-suffix: '后缀' }
proxy-providers:
  link1: { <<: *providers, url: '订阅链接1', path: ./providers/link1.yaml }
  link2: { <<: *providers, url: '订阅链接2', path: ./providers/link2.yaml }
  link3: { <<: *providers, url: '订阅链接3', path: ./providers/link3.yaml }
# 策略分组
use: &use { use: [link1,link2] }




ipv6: true
allow-lan: false
bind-address: '*'
mode: rule
log-level: error
unified-delay: true
tcp-concurrent: true
find-process-mode: 'off'
disable-keep-alive: false
keep-alive-interval: 15
keep-alive-idle: 300
etag-support: true
# global-ua: 'Mozilla/5.0 (Linux; Android 16; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.7778.217 Mobile Safari/537.36'
# global-ua: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.7778.257 Safari/537.36'
# external-controller: 127.0.0.1:9090
# secret: '密码'
# external-doh-server: /dns-query
# external-ui: ./zashboard
# external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip'
profile: { store-selected: true, store-fake-ip: true }
experimental: { quic-go-disable-gso: false, quic-go-disable-ecn: true, dialer-ip4p-convert: false }
port: 0
socks-port: 0
mixed-port: 0
redir-port: 0
tproxy-port: 0
tun:
  enable: true
  # Android dummy9 / Windows "以太网 9" / MacOS utun9
  # device: dummy9
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true
  disable-icmp-forwarding: true
  # endpoint-independent-nat: true
  dns-hijack: [any:53,tcp://any:53]
  udp-timeout: 300
hosts:
  dns.alidns.com: [223.5.5.5,223.6.6.6,'2400:3200::1','2400:3200:baba::1']
  doh.pub: [120.53.53.53,1.12.12.21]
  dns.google: [8.8.8.8,8.8.4.4,'2001:4860:4860::8888','2001:4860:4860::8844']
  dns.quad9.net: [9.9.9.9,149.112.112.112,'2620:fe::fe','2620:fe::9']
  services.googleapis.cn: services.googleapis.com
  google.cn: google.com
  cn.bing.com: global.bing.com
fakeip-dns: &fakeip-dns ['rcode://success']
direct-dns: &direct-dns ['119.29.29.29#直接连接','223.5.5.5#直接连接']
direct-doh: &direct-doh ['https://dns.alidns.com/dns-query#直接连接','https://doh.pub/dns-query#直接连接&h3=false']
proxy-dns: &proxy-dns ['8.8.8.8#代理DNS','9.9.9.9#代理DNS']
proxy-doh: &proxy-doh ['https://dns.google/dns-query#代理DNS','https://dns.quad9.net/dns-query#代理DNS']
dns: 
  enable: true
  ipv6: true
  ipv6-timeout: 300
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  prefer-h3: true
  respect-rules: false
  # listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  fake-ip-range6: fd00:dcba:9876::/64
  # fake-ip-ttl: 1
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - RULE-SET,ads,fake-ip
    - RULE-SET,ai,fake-ip
    - RULE-SET,proxy@direct,real-ip
    - RULE-SET,proxy-lite,fake-ip
    - RULE-SET,direct-lite,real-ip
    - MATCH,fake-ip
  default-nameserver: *direct-dns
  proxy-server-nameserver: *direct-doh
  # proxy-server-nameserver-policy: { example.cpm: 'https://223.5.5.5/dns-query#直接连接' }
  nameserver: *proxy-dns
  nameserver-policy:
    'rule-set:ads': ['rcode://name_error']
    'rule-set:ai': *fakeip-dns
    'rule-set:proxy@direct': *direct-doh
    'rule-set:proxy-lite': *fakeip-dns
    'rule-set:direct-lite': *direct-dns
    'rule-set:dnsmasq-china-lite': *direct-dns
  direct-nameserver: *direct-dns
  direct-nameserver-follow-policy: true
sniffer: 
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff: { HTTP: { ports: [80,8080-8880], override-destination: true }, TLS: { ports: [443,8443] }, QUIC: { ports: [443,8443] } }
  skip-domain: ['rule-set:ads','rule-set:ai','rule-set:proxy@direct','rule-set:proxy-lite','rule-set:direct-lite','rule-set:dnsmasq-china-lite']
  skip-src-address: ['rule-set:telegram_ip','rule-set:direct_ip']
ip: &ip { type: http, interval: 86400, proxy: 代理连接, behavior: ipcidr, format: mrs }
domain: &domain { type: http, interval: 86400, proxy: 代理连接, behavior: domain, format: mrs }
rule-providers:
  ads: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/ads.mrs', path: ./rules/ads.mrs }
  ai: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/ai.mrs', path: ./rules/ai.mrs }
  proxy@direct: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/proxy@direct.mrs', path: ./rules/proxy@direct.mrs }
  proxy-lite: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/proxy-lite.mrs', path: ./rules/proxy-lite.mrs }
  direct-lite: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/direct-lite.mrs', path: ./rules/direct-lite.mrs }
  dnsmasq-china-lite: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/dnsmasq-china-lite.mrs', path: ./rules/dnsmasq-china-lite.mrs }
  telegram_ip: { <<: *ip, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/ip/telegram.mrs', path: ./rules/telegram_ip.mrs }
  direct_ip: { <<: *ip, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/ip/direct.mrs', path: ./rules/direct_ip.mrs }
quic: &quic 'AND,((NETWORK,udp),(DST-PORT,443)),代理QUIC'
rules:
  - DST-PORT,5228-5230,直接连接
  - SUB-RULE,(RULE-SET,telegram_ip,no-resolve),sub-telegram
  - RULE-SET,ads,REJECT
  - SUB-RULE,(RULE-SET,ai),sub-ai
  - RULE-SET,proxy@direct,直接连接
  - SUB-RULE,(RULE-SET,proxy-lite),sub-proxy
  - RULE-SET,direct-lite,直接连接
  - RULE-SET,direct_ip,直接连接
  - *quic
  - MATCH,代理连接
sub-rules:
  sub-ai: [*quic,'MATCH,国外AI']
  sub-telegram: [*quic,'MATCH,TELEGRAM']
  sub-proxy: [*quic,'MATCH,代理连接']
proxies: [{ name: IPV4优先, type: direct, udp: true, ip-version: ipv4-prefer },{ name: IPV6优先, type: direct, udp: true, ip-version: ipv6-prefer },{ name: 仅IPV4, type: direct, udp: true, ip-version: ipv4 },{ name: 仅IPV6, type: direct, udp: true, ip-version: ipv6 }]
fall: &fall { type: fallback, <<: *use, empty-fallback: REJECT, hidden: true }
dl: &dl { type: select, proxies: [代理连接,直接连接,最低延迟,香港|故障转移,台湾|故障转移,新加坡|故障转移,日本|故障转移,韩国|故障转移,美国|故障转移,加拿大|故障转移,德国|故障转移,英国|故障转移,法国|故障转移,荷兰|故障转移], include-all-providers: true }
proxy-groups:
  - { name: 代理连接, type: select, proxies: [最低延迟,香港|故障转移,台湾|故障转移,新加坡|故障转移,日本|故障转移,韩国|故障转移,美国|故障转移,加拿大|故障转移,德国|故障转移,英国|故障转移,法国|故障转移,荷兰|故障转移], include-all-providers: true, icon: 'https://mihomo.echs.top/img/icon/Global.webp' }
  - { name: 直接连接, type: select, proxies: [DIRECT,IPV4优先,IPV6优先,仅IPV4,仅IPV6], icon: 'https://mihomo.echs.top/img/icon/DIRECT.webp' }
  - { name: 代理DNS, <<: *dl, icon: 'https://mihomo.echs.top/img/icon/Server.webp' }
  - { name: 代理QUIC, type: select, proxies: [PASS-RULE,REJECT], icon: 'https://mihomo.echs.top/img/icon/Settings.webp' }
  - { name: 国外AI, <<: *dl, icon: 'https://mihomo.echs.top/img/icon/AI.webp' }
  - { name: TELEGRAM, <<: *dl, icon: 'https://mihomo.echs.top/img/icon/Telegram.webp' }
  - { name: 最低延迟, type: url-test, tolerance: 30, <<: *use, empty-fallback: REJECT, hidden: true, icon: 'https://mihomo.echs.top/img/icon/Fast.webp' }
  - { name: 香港|故障转移, <<: *fall, filter: '(?i)🇭🇰|香港|\\bHK\\b|\\bhongkong\\b|\\bhong\s?kong\\b', icon: 'https://mihomo.echs.top/img/flags/hk.svg' }
  - { name: 台湾|故障转移, <<: *fall, filter: '(?i)🇹🇼|台湾|\\bTW\\b|\\btaiwan\\b', icon: 'https://mihomo.echs.top/img/flags/tw.svg' }
  - { name: 新加坡|故障转移, <<: *fall, filter: '(?i)🇸🇬|新加坡|狮城|\\bSG\\b|\\bsingapore\\b', icon: 'https://mihomo.echs.top/img/flags/sg.svg' }
  - { name: 日本|故障转移, <<: *fall, filter: '(?i)🇯🇵|日本|\\bJP\\b|\\bjapan\\b', icon: 'https://mihomo.echs.top/img/flags/jp.svg' }
  - { name: 韩国|故障转移, <<: *fall, filter: '(?i)🇰🇷|韩国|\\bKR\\b', icon: 'https://mihomo.echs.top/img/flags/kr.svg' }
  - { name: 美国|故障转移, <<: *fall, filter: '(?i)🇺🇸|美国|\\bUS\\b|\\bunitedstates\\b|\\bunited\s?states\\b', icon: 'https://mihomo.echs.top/img/flags/us.svg' }
  - { name: 加拿大|故障转移, <<: *fall, filter: '(?i)🇨🇦|加拿大|\\bCA\\b|\\bcanada\\b', icon: 'https://mihomo.echs.top/img/flags/ca.svg' }
  - { name: 德国|故障转移, <<: *fall, filter: '(?i)🇩🇪|德国|\\bDE\\b|\\bgermany\\b', icon: 'https://mihomo.echs.top/img/flags/de.svg' }
  - { name: 英国|故障转移, <<: *fall, filter: '(?i)🇬🇧|英国|\\bUK\\b|\\bGB\\b|\\bunitedkingdom\\b|\\bunited\s?kingdom\\b', icon: 'https://mihomo.echs.top/img/flags/gb.svg' }
  - { name: 法国|故障转移, <<: *fall, filter: '(?i)🇫🇷|法国|\\bFR\\b', icon: 'https://mihomo.echs.top/img/flags/fr.svg' }
  - { name: 荷兰|故障转移, <<: *fall, filter: '(?i)🇳🇱|荷兰|\\bNL\\b|\\bnetherlands?\\b', icon: 'https://mihomo.echs.top/img/flags/nl.svg' }
  - { name: GLOBAL, type: select, proxies: [最低延迟,香港|故障转移,台湾|故障转移,新加坡|故障转移,日本|故障转移,韩国|故障转移,美国|故障转移,加拿大|故障转移,德国|故障转移,英国|故障转移,法国|故障转移,荷兰|故障转移,代理连接,直接连接,代理DNS,代理QUIC,国外AI,TELEGRAM], include-all-providers: true, hidden: true, icon: 'https://mihomo.echs.top/img/icon/Globefish.webp' }
