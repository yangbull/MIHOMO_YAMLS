    "rule-set:WildRift-zj": *global-dns
    "rule-set:category-games-!cn": *global-dns
    "rule-set:twitter": *global-dns
    "rule-set:abroad_dns_cdn": *global-dns
    "rule-set:gfw": *global-dns
    "rule-set:greatfire": *global-dns
