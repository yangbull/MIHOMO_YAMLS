# 地址: https://github.com/Wans-OS/my-backup
# 作者: Wans
# 更新: 2026-04-09 00:15:13
# 描述: 在proxy-providers加入您的机场订阅链接 (代理提供者)

# 订阅锚点，排除了一些节点，例如 包含剩余, 官网, 到期, 也可以在exclude-filter添加你需要排除的节点
FilterPP: &FilterPP "Expire|到期|剩余|Traffic|网址|官网|过期|会员ID"

# 测速地址
# YouTube
# https://www.youtube.com/generate_204
# Google
# https://www.gstatic.com/generate_204
# https://www.google.com/generate_204
# https://www.google.cn/generate_204
# Cloudflare
# https://cp.cloudflare.com/generate_204
# https://www.qualcomm.cn/generate_204
UrlTest:  &UrlTest 'https://www.gstatic.com/generate_204'

ProvidersURL: &ProvidersURL { exclude-filter: *FilterPP, type: http, interval: 86400, health-check: { enable: true, url: *UrlTest, interval: 300 } }
ProvidersFILE: &ProvidersFILE { exclude-filter: *FilterPP, type: file, interval: 86400, health-check: { enable: true, url: *UrlTest, interval: 300 } }
# 官方配置文档: https://wiki.metacubex.one/config/proxy-providers/
proxy-providers:
  main:
    <<: *ProvidersURL
    url: https://anyland.club/#/register?code=R7vdKxbE
    path: ./proxy_provider/main.yaml
    override:
      udp: true
      additional-prefix: '主-'  # 订阅节点前缀，方便区分该节点属于哪个订阅链接 例如`主-香港🇭🇰

  back:
    <<: *ProvidersFILE
    path: proxy_provider/back.yaml   # 本地文件，内容格式同订阅链接，方便测试和备用
    override:
      udp: true
      additional-prefix: "备-6-"

# 通用配置
mode: rule
ipv6: true
mixed-port: 7890
allow-lan: true
bind-address: '*'
log-level: warning
unified-delay: true
find-process-mode: strict
tcp-concurrent: true
keep-alive-interval: 15
keep-alive-idle: 600


# 规则选择缓存
profile:
  store-selected: true
  store-fake-ip: true

# DNS配置
dns:
  enable: true
  ipv6: true
  prefer-h3: false
  use-hosts: true
  listen: 0.0.0.0:1053
  use-system-hosts: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::/64
  fake-ip-filter:
    - RULE-SET:Lan
    - RULE-SET:China
  fallback:
    - https://dns.cloudflare.com/dns-query#ecs=1.1.1.1/24&ecs-override=true
    - https://dns.google/dns-query#ecs=8.8.8.8/24&ecs-override=true
  default-nameserver: # 默认 DNS, 用于解析 DNS 服务器 的域名，必须为 IP, 可为加密 DNS
    - tls://223.5.5.5
    - tls://119.29.29.29
    - tls://8.8.8.8
  nameserver: # 默认的域名解析服务器，如不配置 fallback/proxy-server-nameserver , 则所有域名都由 nameserver 解析
    - https://dns.cloudflare.com/dns-query#ecs=1.1.1.1/24&ecs-override=true
    - https://dns.google/dns-query#ecs=8.8.8.8/24&ecs-override=true
  proxy-server-nameserver:  # 代理节点域名解析服务器，仅用于解析代理节点的域名
    - https://doh.pub/dns-query#ecs=223.5.5.5/24&ecs-override=true
    - https://dns.alidns.com/dns-query#ecs=223.5.5.5/24&ecs-override=true
  direct-nameserver:
    - https://doh.pub/dns-query#ecs=223.5.5.5/24&ecs-override=true
    - https://dns.alidns.com/dns-query#ecs=223.5.5.5/24&ecs-override=true
  direct-nameserver-follow-policy: true
  nameserver-policy: # 指定域名查询的解析服务器，优先于 nameserver/fallback 查询
    "RULE-SET:China,Lan": 
      - https://doh.pub/dns-query#ecs=223.5.5.5/24&ecs-override=true
      - https://dns.alidns.com/dns-query#ecs=223.5.5.5/24&ecs-override=true

# GEO配置
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geodata-loader: memconservative
geox-url:
  geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  asn: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

# 入站
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack: [any:53, tcp://any:53]

# 嗅探
sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443, 8443]
  skip-domain:
     - "Mijia Cloud"
     - "+.push.apple.com"

# 实验性功能
experimental:
  quic-go-disable-gso: true

# 面板设置
external-ui-name: zashboard
external-ui: ui
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
# secret: "Wans"
external-controller: '127.0.0.1:9090'


# 代理组锚点 hidden: true 是为了隐藏地区分组，有需要显示出来的佬友可以删除
BaseUT: &BaseUT { type: url-test, interval: 300, lazy: true, hidden: true, include-all: true }
BaseFB: &BaseFB { type: fallback, interval: 300, lazy: true, hidden: true, include-all: true }
BaseCR: &BaseCR { type: load-balance, interval: 300, lazy: true, hidden: true, include-all: true, strategy: round-robin }
BaseCH: &BaseCH { type: load-balance, interval: 300, lazy: true, hidden: true, include-all: true, strategy: consistent-hashing }

