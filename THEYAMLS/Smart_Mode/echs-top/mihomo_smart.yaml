# update: 2026-07-02
# 简介: https://github.com/echs-top/proxy


# 节点IP优先级：ip-version: ipv6-prefer
providers: &providers { type: http, interval: 86400, proxy: 直接连接, header: { User-Agent: ["clash-verge/v2.5.1"] }, health-check: { enable: true, url: 'https://dns.google/generate_204', expected-status: 204,  interval: 600, timeout: 3000, max-failed-times: 2, lazy: false }, override: { ip-version: dual }, exclude-filter: '(?i)套餐|剩余|流量|到期|重置|频道|订阅|官网|禁止|客户端|有效|联系|测试|节点|日期|群组|加入|通知|维护|网址|地址|下载|更新|APP|登录|严禁|恢复|处理|谢谢' }
# age-secret-key: '私钥', override: { ip-version: dual, additional-suffix: '后缀' }
proxy-providers:
  link1: { <<: *providers, url: '订阅链接1', path: ./providers/link1.yaml }
  link2: { <<: *providers, url: '订阅链接2', path: ./providers/link2.yaml }
  link3: { <<: *providers, url: '订阅链接3', path: ./providers/link3.yaml }
  link4: { <<: *providers, url: '订阅链接4', path: ./providers/link4.yaml }
# 地区分组，建议区分普通节点和专线
area1: &area1 { use: [link1,link2] }
area2: &area2 { use: [link3] }
# 轮询下载
download: &download { use: [link4] }
# 手动选择
use: &use { use: [link1,link3] }
# smart参数：policy-priority: "JP:1.2;SG:1.2;US:1.2", type-priority: "ss:1.5;vless:1.2;vmess:0.8"
# type-priority还在提交pull中，现在还是无效参数
set: &set { policy-priority: "", type-priority: "" }




ipv6: true
allow-lan: false
bind-address: '*'
mode: rule
log-level: error
unified-delay: true
tcp-concurrent: true
find-process-mode: 'off'
disable-keep-alive: false
keep-alive-interval: 15
keep-alive-idle: 600
etag-support: true
# global-ua: 'Mozilla/5.0 (Linux; Android 16; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.7778.217 Mobile Safari/537.36'
# global-ua: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.7778.257 Safari/537.36'
# external-controller: "[::]:9090"
# secret: '密码'
# external-doh-server: /dns-query
# external-ui: ./zashboard
# 霞鹜文楷：https://github.com/echs-top/proxy/releases/download/zashboard/dist.zip
# external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip'
lgbm-auto-update: true
lgbm-update-interval: 72
lgbm-url: 'https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model-large.bin'
profile: { store-selected: true, store-fake-ip: true, smart-collector-size: 100 }
experimental: { quic-go-disable-gso: false, quic-go-disable-ecn: true, dialer-ip4p-convert: false }
port: 0
socks-port: 0
mixed-port: 0
redir-port: 0
tproxy-port: 0
tun:
  enable: true
  # Android dummy9 / Windows "以太网 9" / MacOS utun9
  # device: dummy9
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true
  disable-icmp-forwarding: true
  # endpoint-independent-nat: true
  dns-hijack: [any:53,tcp://any:53]
  udp-timeout: 600
hosts:
  dns.alidns.com: [223.5.5.5,223.6.6.6,'2400:3200::1','2400:3200:baba::1']
  doh.pub: [120.53.53.53,1.12.12.12]
  dns.google: [8.8.8.8,8.8.4.4,'2001:4860:4860::8888','2001:4860:4860::8844']
  dns.quad9.net: [9.9.9.9,149.112.112.112,'2620:fe::fe','2620:fe::9']
  services.googleapis.cn: services.googleapis.com
  google.cn: google.com
  cn.bing.com: global.bing.com
direct-dns: &direct-dns ['https://dns.alidns.com/dns-query#直接连接','https://doh.pub/dns-query#直接连接&h3=false']
proxy-dns: &proxy-dns ['https://dns.google/dns-query#代理DNS&ecs=8.8.8.8/24&ecs-override=true','https://dns.quad9.net/dns-query#代理DNS&ecs=9.9.9.9/24&ecs-override=true']
dns: 
  enable: true
  ipv6: true
  ipv6-timeout: 300
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  prefer-h3: true
  respect-rules: false
  # listen: "[::]:1053"
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  fake-ip-range6: fd00:a4c5:9b12:d3f8:e760:00df::/96
  fake-ip-ttl: 1
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - RULE-SET,ads,fake-ip
    - RULE-SET,proxy@direct,real-ip
    - RULE-SET,ai,fake-ip
    - RULE-SET,download,fake-ip
    - RULE-SET,safe,fake-ip
    - RULE-SET,google,fake-ip
    - RULE-SET,media,fake-ip
    - RULE-SET,proxy-lite,fake-ip
    - RULE-SET,direct-lite,real-ip
    - MATCH,fake-ip
  default-nameserver: [223.6.6.6,119.29.29.29]
  proxy-server-nameserver: *direct-dns
  # proxy-server-nameserver-policy: { example.cpm: 'https://223.5.5.5/dns-query#直接连接' }
  nameserver: *proxy-dns
  nameserver-policy:
    'rule-set:ads': ['rcode://name_error']
    'rule-set:proxy@direct': *direct-dns
    'rule-set:ai,download,safe,google,media,proxy-lite': *proxy-dns
    'rule-set:direct-lite,dnsmasq-china-lite': *direct-dns
  direct-nameserver: *direct-dns
  direct-nameserver-follow-policy: true
sniffer: 
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff: { HTTP: { ports: [80,8080-8880], override-destination: true }, TLS: { ports: [443,8443] }, QUIC: { ports: [443,8443] } }
  skip-domain: ['rule-set:ads,proxy@direct,ai,download,safe,google,media,proxy-lite,direct-lite,dnsmasq-china-lite']
  skip-src-address: ['rule-set:telegram_ip,safe_ip,google_ip,media_ip,direct_ip']
ip: &ip { type: http, interval: 86400, proxy: 代理连接, behavior: ipcidr, format: mrs }
domain: &domain { type: http, interval: 86400, proxy: 代理连接, behavior: domain, format: mrs }
rule-providers:
  ads: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/ads.mrs', path: ./rules/ads.mrs }
  proxy@direct: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/proxy@direct.mrs', path: ./rules/proxy@direct.mrs }
  ai: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/ai.mrs', path: ./rules/ai.mrs }
  download: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/download.mrs', path: ./rules/download.mrs }
  safe: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/safe.mrs', path: ./rules/safe.mrs }
  google: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/google.mrs', path: ./rules/google.mrs }
  media: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/media.mrs', path: ./rules/media.mrs }
  proxy-lite: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/proxy-lite.mrs', path: ./rules/proxy-lite.mrs }
  direct-lite: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/direct-lite.mrs', path: ./rules/direct-lite.mrs }
  dnsmasq-china-lite: { <<: *domain, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/domain/dnsmasq-china-lite.mrs', path: ./rules/dnsmasq-china-lite.mrs }
  telegram_ip: { <<: *ip, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/ip/telegram.mrs', path: ./rules/telegram_ip.mrs }
  safe_ip: { <<: *ip, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/ip/safe.mrs', path: ./rules/safe_ip.mrs }
  google_ip: { <<: *ip, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/ip/google.mrs', path: ./rules/google_ip.mrs }
  media_ip: { <<: *ip, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/ip/media.mrs', path: ./rules/media_ip.mrs }
  direct_ip: { <<: *ip, url: 'https://raw.githubusercontent.com/echs-top/proxy/main/mrs/ip/direct.mrs', path: ./rules/direct_ip.mrs }
quic: &quic 'AND,((NETWORK,udp),(DST-PORT,443)),代理QUIC'
rules:
  - DST-PORT,5228-5230,直接连接
  - SUB-RULE,(RULE-SET,telegram_ip,no-resolve),sub-telegram
  - RULE-SET,ads,REJECT
  - RULE-SET,proxy@direct,直接连接
  - SUB-RULE,(RULE-SET,ai),sub-ai
  - SUB-RULE,(RULE-SET,download),sub-download
  - SUB-RULE,(RULE-SET,safe),sub-safe
  - SUB-RULE,(RULE-SET,google),sub-google
  - SUB-RULE,(RULE-SET,media),sub-media
  - SUB-RULE,(RULE-SET,proxy-lite),sub-proxy
  - RULE-SET,direct-lite,直接连接
  - SUB-RULE,(RULE-SET,safe_ip),sub-safe
  - SUB-RULE,(RULE-SET,google_ip),sub-google
  - SUB-RULE,(RULE-SET,media_ip),sub-media
  - RULE-SET,direct_ip,直接连接
  - *quic
  - MATCH,代理连接
sub-rules:
  sub-telegram: [*quic,'MATCH,TELEGRAM']
  sub-ai: [*quic,'MATCH,国外AI']
  sub-download: [*quic,'MATCH,下载相关']
  sub-safe: [*quic,'MATCH,风控安全']
  sub-google: [*quic,'MATCH,GOOGLE']
  sub-media: [*quic,'MATCH,海外媒体']
  sub-proxy: [*quic,'MATCH,代理连接']
proxies: [{ name: IPV4优先, type: direct, udp: true, ip-version: ipv4-prefer },{ name: IPV6优先, type: direct, udp: true, ip-version: ipv6-prefer },{ name: 仅IPV4, type: direct, udp: true, ip-version: ipv4 },{ name: 仅IPV6, type: direct, udp: true, ip-version: ipv6 }]
